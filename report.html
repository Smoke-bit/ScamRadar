<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Scam | ScamRadar</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/report.css">
</head>
<body>

<header>

    <nav class="navbar">

        <div class="logo">
            <a href="index.html">ScamRadar</a>
        </div>

        <ul class="nav-links">
            <li><a href="verify.html">Verify</a></li>
            <li><a href="analyze.html">Analyze</a></li>
            <li><a href="report.html">Report</a></li>
            <li><a href="learn.html">Learn</a></li>
        </ul>

    </nav>

</header>

<section class="report-page">

    <h1>Report a Scam</h1>

    <p>
        Help others stay safe by reporting suspicious activity.
    </p>

    <form>

        <label>What are you reporting?</label>

        <select>

            <option>Website</option>

            <option>Phone Number</option>

            <option>UPI ID</option>

            <option>Email Address</option>

            <option>WhatsApp Number</option>

            <option>Telegram Username</option>

            <option>Instagram Account</option>

            <option>Other</option>

        </select>

        <label>Enter the Value</label>

        <input
            type="text"
            placeholder="Example: +91xxxxxxxxxx"
        >

        <label>Scam Category</label>

        <select>

            <option>Phishing</option>

            <option>Fake Shopping</option>

            <option>Courier Scam</option>

            <option>Investment Scam</option>

            <option>Job Scam</option>

            <option>Bank Scam</option>

            <option>UPI Fraud</option>

            <option>Other</option>

        </select>

        <label>Description</label>

        <textarea
            placeholder="Tell us what happened..."
        ></textarea>

        <label>Upload Evidence</label>

        <input type="file">

        <label>Location (Optional)</label>

        <input
            type="text"
            placeholder="City or State"
        >

        <label>

            <input type="checkbox">

            Submit anonymously

        </label>

        <button type="submit">

            Submit Report

        </button>

    </form>

</section>

<section class="notice">

    <h2>Before You Submit</h2>

    <ul>

        <li>Only submit genuine reports.</li>

        <li>Do not upload sensitive personal information.</li>

        <li>False reports may be removed.</li>

    </ul>

</section>

<footer>

    <p>© 2026 ScamRadar</p>

</footer>

<script src="js/report.js"></script>

</body>
</html>
